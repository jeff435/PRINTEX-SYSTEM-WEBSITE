<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Printex — Starting…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.6s ease;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #00d4ff 0%, #0080ff 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.4), 0 0 80px rgba(0, 128, 255, 0.15);
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #0080ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .tagline {
      font-size: 13px;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .spinner-track {
      width: 220px;
      height: 3px;
      background: #1a1a1a;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 16px;
    }

    .spinner-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #00d4ff, #0080ff);
      border-radius: 99px;
      animation: slide 1.4s ease-in-out infinite;
    }

    .status {
      font-size: 11px;
      color: #444;
      letter-spacing: 1px;
      margin-top: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(0,212,255,0.4), 0 0 80px rgba(0,128,255,0.15); }
      50%       { box-shadow: 0 0 60px rgba(0,212,255,0.6), 0 0 120px rgba(0,128,255,0.25); }
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(150%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-icon">🖨️</div>
    <h1>Printex</h1>
    <div class="tagline">Business Management System</div>
    <div class="spinner-track"><div class="spinner-bar"></div></div>
    <div class="status">Starting local server…</div>
  </div>
</body>
</html>
